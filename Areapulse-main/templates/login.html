<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AreaPulse · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter', system-ui, -apple-system, sans-serif;
  background:#f5f5f5;
  color:#1a1a1a;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}

.card {
  background:#fff;
  width:100%; max-width:440px;
  padding:48px 36px 40px;
  border-radius:24px;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
}

.brand {
  text-align:center;
  margin-bottom:8px;
}
.brand h1 {
  font-size:32px;
  font-weight:700;
  color:#1a1a1a;
  letter-spacing:-0.5px;
}
.brand p {
  font-size:15px;
  color:#666;
  margin-top:4px;
  font-weight:400;
}

/* Toggle tabs - 3 tabs now */
.toggle-row {
  display:flex;
  gap:6px;
  margin:28px 0 24px;
}
.toggle-btn {
  flex:1;
  padding:12px 4px;
  border:none;
  border-radius:12px;
  font-family:inherit;
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  background:#f0f0f0;
  color:#444;
  white-space:nowrap;
}
.toggle-btn:hover {
  background:#e8e8e8;
}
.toggle-btn.active {
  background:#1a8cff;
  color:#fff;
}
.toggle-btn#tab-ngo.active {
  background:#6B9473;
}

/* Form sections */
.form-section {
  display:none;
}
.form-section.active {
  display:block;
}

/* Google button */
.google-btn {
  width:100%;
  padding:14px;
  background:#fff;
  border:1px solid #e0e0e0;
  border-radius:14px;
  font-family:inherit;
  font-size:15px;
  font-weight:500;
  color:#1a1a1a;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:all 0.2s;
  margin-bottom:20px;
}
.google-btn:hover {
  background:#fafafa;
  border-color:#d0d0d0;
}
.google-btn svg {
  width:20px; height:20px;
}

/* OR divider */
.or-divider {
  display:flex;
  align-items:center;
  gap:12px;
  margin:0 0 20px;
  color:#999;
  font-size:13px;
  font-weight:500;
}
.or-divider::before,
.or-divider::after {
  content:'';
  flex:1;
  height:1px;
  background:#e8e8e8;
}

/* Inputs */
.input-group {
  margin-bottom:14px;
}
.input-group input {
  width:100%;
  padding:15px 18px;
  background:#fff;
  border:1px solid #e0e0e0;
  border-radius:14px;
  font-family:inherit;
  font-size:15px;
  color:#1a1a1a;
  outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.input-group input::placeholder {
  color:#aaa;
  font-weight:400;
}
.input-group input:focus {
  border-color:#1a8cff;
  box-shadow:0 0 0 3px rgba(26,140,255,0.1);
}

/* Gov restricted banner */
.gov-banner {
  padding:12px 16px;
  background:#f0f7ff;
  border-radius:12px;
  font-size:14px;
  color:#1a8cff;
  font-weight:500;
  margin-bottom:16px;
}

/* NGO restricted banner */
.ngo-banner {
  padding:12px 16px;
  background:#E3EFE3;
  border-radius:12px;
  font-size:14px;
  color:#4F7158;
  font-weight:500;
  margin-bottom:16px;
}

/* Submit button */
.submit-btn {
  width:100%;
  padding:16px;
  background:#1a8cff;
  border:none;
  border-radius:14px;
  font-family:inherit;
  font-size:16px;
  font-weight:600;
  color:#fff;
  cursor:pointer;
  transition:all 0.2s;
  margin-top:6px;
}
.submit-btn:hover {
  background:#1470d9;
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(26,140,255,0.3);
}
.submit-btn:active {
  transform:translateY(0);
}

/* NGO-specific submit button (sage colour) */
.submit-btn.ngo {
  background:#6B9473;
}
.submit-btn.ngo:hover {
  background:#4F7158;
  box-shadow:0 4px 16px rgba(107,148,115,0.3);
}

/* Footer text */
.footer-text {
  text-align:center;
  margin-top:20px;
  font-size:13px;
  color:#888;
}

/* Error message */
.error-msg {
  background:#fff0f0;
  border:1px solid #ffcccc;
  color:#d32f2f;
  padding:12px 16px;
  border-radius:12px;
  font-size:13px;
  margin-bottom:16px;
  display:none;
}
.error-msg.show {
  display:block;
}

/* Loading overlay */
.loading-overlay {
  position:fixed; inset:0; z-index:999;
  background:rgba(255,255,255,0.9);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
}
.loading-overlay.show {
  display:flex;
}
.spinner {
  width:40px; height:40px;
  border:3px solid rgba(26,140,255,0.2);
  border-top-color:#1a8cff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text {
  font-family:'Inter', sans-serif;
  font-size:14px; color:#1a8cff; font-weight:500;
}

/* Demo hint */
.demo-hint {
  margin-top:18px;
  padding:14px 16px;
  background:#f8f9fa;
  border:1px solid #e8e8e8;
  border-radius:12px;
  font-size:12px;
  color:#666;
  line-height:1.7;
}
.demo-hint strong {
  color:#1a8cff;
  font-weight:600;
  display:block;
  margin-bottom:6px;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1px;
}
.demo-hint code {
  background:#1a1a1a;
  color:#fff;
  padding:2px 8px;
  border-radius:4px;
  font-size:12px;
  font-family:'SF Mono', monospace;
}

/* Responsive */
@media (max-width:480px) {
  .card { padding:36px 24px 32px; border-radius:20px; }
  .brand h1 { font-size:28px; }
  .toggle-btn { font-size:12.5px; padding:11px 2px; }
}
@media (max-width:380px){
  .card { padding:28px 18px 24px; }
  .brand h1 { font-size:24px; }
  .toggle-btn { font-size:12px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Authenticating...</div>
</div>

<div class="card">
  <div class="brand">
    <h1>AreaPulse</h1>
    <p>Community Reporting Platform</p>
  </div>

  <!-- Toggle - 3 tabs -->
  <div class="toggle-row">
    <button class="toggle-btn active" id="tab-citizen" onclick="switchTab('citizen')">Citizen</button>
    <button class="toggle-btn" id="tab-gov" onclick="switchTab('gov')">Government</button>
    <button class="toggle-btn" id="tab-ngo" onclick="switchTab('ngo')">NGO Partner</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <!-- Citizen Form -->
  <div class="form-section active" id="form-citizen">
    <button class="google-btn" type="button" onclick="googleLogin()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="or-divider"><span>OR</span></div>

    <form method="POST" action="/login" id="citizen-form">
      <div class="input-group">
        <input type="text" name="name" id="citizen-name" placeholder="Your name" required autocomplete="username"/>
      </div>
      <!-- Citizen leaves pin blank -->
      <input type="hidden" name="pin" value=""/>
      <button type="submit" class="submit-btn">Log in</button>
    </form>
  </div>

  <!-- Gov Form -->
  <div class="form-section" id="form-gov">
    <div class="gov-banner">Restricted Government Access</div>

    <form method="POST" action="/login" id="gov-form">
      <div class="input-group">
        <input type="text" name="name" id="gov-username" placeholder="Government Username" required autocomplete="username"/>
      </div>
      <div class="input-group">
        <input type="password" name="pin" id="gov-pin" placeholder="Security PIN" required maxlength="6" autocomplete="off"/>
      </div>
      <button type="submit" class="submit-btn">Enter Portal</button>
    </form>
  </div>

  <!-- NGO Form -->
  <div class="form-section" id="form-ngo">
    <div class="ngo-banner">NGO Partner Access</div>

    <form method="POST" action="/login" id="ngo-form">
      <div class="input-group">
        <input type="text" name="name" id="ngo-username" placeholder="NGO Username" required autocomplete="username"/>
      </div>
      <div class="input-group">
        <input type="password" name="pin" id="ngo-pin" placeholder="Security PIN" required maxlength="6" autocomplete="off"/>
      </div>
      <button type="submit" class="submit-btn ngo">Enter NGO Portal</button>
    </form>
  </div>

  <p class="footer-text">Secure access to AreaPulse</p>

  <div class="demo-hint">
    <strong>▼ Demo Accounts</strong>
    Gov officers: <code>gov_rmc</code>, <code>gov_water</code>, <code>gov_electricity</code>, <code>gov_traffic</code><br>
    NGO partners: <code>ngo_sanitation</code>, <code>ngo_water</code>, <code>ngo_civic</code>, <code>ngo_power</code><br>
    PIN: <code>0000</code> for all
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const url = new URL(window.location.href);
  const error = url.searchParams.get('error');
  const govAttempt = url.searchParams.get('gov_attempt');
  const ngoAttempt = url.searchParams.get('ngo_attempt');

  if (error) {
    document.getElementById('error-msg').textContent = decodeURIComponent(error);
    document.getElementById('error-msg').classList.add('show');
  }

  if (govAttempt) {
    switchTab('gov');
    document.getElementById('gov-username').value = govAttempt;
    document.getElementById('gov-pin').focus();
  }

  if (ngoAttempt) {
    switchTab('ngo');
    document.getElementById('ngo-username').value = ngoAttempt;
    document.getElementById('ngo-pin').focus();
  }
});

function switchTab(tab) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('form-' + tab).classList.add('active');
  document.getElementById('error-msg').classList.remove('show');
}

// Show loading spinner on form submit
document.getElementById('citizen-form').addEventListener('submit', function() {
  document.getElementById('loading-overlay').classList.add('show');
});

document.getElementById('gov-form').addEventListener('submit', function(e) {
  const username = document.getElementById('gov-username').value.trim().toLowerCase();
  const pin = document.getElementById('gov-pin').value.trim();

  const validGovAccounts = ['gov_rmc', 'gov_water', 'gov_electricity', 'gov_traffic', 'gov_rmkc'];
  if (!validGovAccounts.includes(username)) {
    e.preventDefault();
    document.getElementById('error-msg').textContent = 'Unknown government account. Use demo accounts listed below.';
    document.getElementById('error-msg').classList.add('show');
    return;
  }
  if (!pin) {
    e.preventDefault();
    document.getElementById('error-msg').textContent = 'PIN is required for government accounts.';
    document.getElementById('error-msg').classList.add('show');
    return;
  }

  document.getElementById('loading-overlay').classList.add('show');
});

document.getElementById('ngo-form').addEventListener('submit', function(e) {
  const username = document.getElementById('ngo-username').value.trim().toLowerCase();
  const pin = document.getElementById('ngo-pin').value.trim();

  const validNgoAccounts = ['ngo_sanitation', 'ngo_water', 'ngo_civic', 'ngo_power'];
  if (!validNgoAccounts.includes(username)) {
    e.preventDefault();
    document.getElementById('error-msg').textContent = 'Unknown NGO account. Use demo accounts listed below.';
    document.getElementById('error-msg').classList.add('show');
    return;
  }
  if (!pin) {
    e.preventDefault();
    document.getElementById('error-msg').textContent = 'PIN is required for NGO accounts.';
    document.getElementById('error-msg').classList.add('show');
    return;
  }

  document.getElementById('loading-overlay').classList.add('show');
});

// ── Google OAuth ──────────────────────────────────────────────────────────
// Redirects to /auth/google which starts the real OAuth 2.0 flow.
// Requires GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET env vars on the server.
function googleLogin() {
  document.getElementById('loading-overlay').classList.add('show');
  window.location.href = '/auth/google';
}
</script>

</body>
</html>
